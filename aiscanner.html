<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detektor Gambar AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        input[type="file"] {
            margin: 20px 0;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #preview {
            max-width: 100%;
            margin-top: 15px;
            border-radius: 5px;
            display: none;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }
        .loading {
            color: #ff9800;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pendeteksi Gambar AI</h2>
        <p>Unggah gambar untuk mengecek apakah ini buatan manusia atau AI.</p>
        
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
        <img id="preview" alt="Preview Gambar">
        
        <button id="analyzeBtn" onclick="analyzeImage()">Analisis Gambar</button>
        
        <div id="result"></div>
    </div>

    <script type="module">
        import { HfInference } from 'https://cdn.jsdelivr.net/npm/@huggingface/inference@2.8.0/+esm';

        // Menggunakan token yang kamu berikan
        const HUGGINGFACE_TOKEN = "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";
        
        // Inisialisasi library
        const hf = new HfInference(HUGGINGFACE_TOKEN);

        // Mendaftarkan fungsi ke 'window' agar bisa dibaca oleh HTML
        window.previewImage = function() {
            const file = document.getElementById("imageInput").files[0];
            const preview = document.getElementById("preview");
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        };

        window.analyzeImage = async function() {
            const fileInput = document.getElementById("imageInput");
            const resultDiv = document.getElementById("result");
            const btn = document.getElementById("analyzeBtn");

            if (fileInput.files.length === 0) {
                alert("Silakan pilih gambar terlebih dahulu!");
                return;
            }

            const file = fileInput.files[0];
            resultDiv.innerHTML = "<span class='loading'>Menghubungkan ke sistem AI... Mohon tunggu.</span>";
            btn.disabled = true;

            try {
                // Memanggil model menggunakan library resmi
                const hasil = await hf.imageClassification({
                    model: 'umm-maybe/AI-image-detector',
                    data: file
                });

                // Ambil prediksi dengan skor tertinggi
                const prediksi = hasil[0];
                const persentase = (prediksi.score * 100).toFixed(2);
                const status = prediksi.label === "human" ? "Buatan Manusia 🧍" : "Buatan AI 🤖";
                const warna = prediksi.label === "human" ? "green" : "red";

                resultDiv.innerHTML = `Hasil: <span style="color:${warna}">${status}</span><br>Keyakinan: ${persentase}%`;

            } catch (error) {
                console.error(error); 
                
                // Menangkap pesan error yang spesifik
                if (error.message.includes("401") || error.message.includes("Unauthorized") || error.message.includes("token")) {
                    resultDiv.innerHTML = `<span style="color:red;">Error: Token tidak valid atau sudah dihapus. Silakan buat token baru di Hugging Face.</span>`;
                } else if (error.message.includes("503") || error.message.includes("loading")) {
                    resultDiv.innerHTML = `<span style="color:red;">Model AI sedang bersiap-siap. Mohon tunggu sekitar 30 detik, lalu klik 'Analisis Gambar' lagi.</span>`;
                } else {
                    resultDiv.innerHTML = `<span style="color:red;">Gagal: ${error.message}</span>`;
                }
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
