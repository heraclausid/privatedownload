<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detektor Gambar AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        input[type="file"] { margin: 20px 0; }
        button {
            background-color: #007bff; color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            font-size: 16px; width: 100%;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #preview { max-width: 100%; margin-top: 15px; border-radius: 5px; display: none; }
        #result { margin-top: 20px; font-weight: bold; font-size: 18px; }
        .loading { color: #ff9800; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pendeteksi Gambar AI</h2>
        <p>Unggah gambar untuk mengecek apakah ini buatan manusia atau AI.</p>
        
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
        <img id="preview" alt="Preview Gambar">
        
        <button id="analyzeBtn" onclick="analyzeImage()">Analisis Gambar</button>
        
        <div id="result"></div>
    </div>

    <script>
        // URL Google Script milikmu sudah ditanam secara permanen di sini
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0uHBZldBGpBJ8vkIQnwTf3oRqexU8NlbXKdlC_TZISHSHFEKDy7BGaooJlScmocFK/exec";

        function previewImage() {
            const file = document.getElementById("imageInput").files[0];
            const preview = document.getElementById("preview");
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        }

        // Fungsi mengubah gambar jadi teks (Base64) agar bisa dikirim ke Google Script
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]); // Ambil data mentahnya saja
                reader.onerror = error => reject(error);
            });
        }

        async function analyzeImage() {
            const fileInput = document.getElementById("imageInput");
            const resultDiv = document.getElementById("result");
            const btn = document.getElementById("analyzeBtn");

            if (fileInput.files.length === 0) {
                alert("Silakan pilih gambar terlebih dahulu!");
                return;
            }

            const file = fileInput.files[0];
            resultDiv.innerHTML = "<span class='loading'>Mengirim ke server pribadi... Mohon tunggu.</span>";
            btn.disabled = true;

            try {
                // Ubah gambar ke format Base64
                const base64Data = await getBase64(file);

                // Kirim ke Google Script
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ gambar: base64Data })
                });

                const data = await response.json();

                // Mengecek kalau ada error dari Hugging Face yang diteruskan oleh Google
                if (data.error) {
                    if (data.estimated_time) {
                        resultDiv.innerHTML = `<span style="color:red;">AI sedang "bangun tidur". Coba klik lagi dalam ${Math.round(data.estimated_time)} detik.</span>`;
                        return;
                    }
                    throw new Error(data.error);
                }

                // Ambil hasil (Karena array bisa bertingkat, kita pastikan ambil objek yang benar)
                const prediksi = Array.isArray(data) ? (Array.isArray(data[0]) ? data[0][0] : data[0]) : data;

                if (!prediksi || !prediksi.label) {
                    throw new Error("Format respons tidak dikenali.");
                }

                const persentase = (prediksi.score * 100).toFixed(2);
                const status = prediksi.label === "human" ? "Buatan Manusia 🧍" : "Buatan AI 🤖";
                const warna = prediksi.label === "human" ? "green" : "red";

                resultDiv.innerHTML = `Hasil: <span style="color:${warna}">${status}</span><br>Keyakinan: ${persentase}%`;

            } catch (error) {
                // Jika terjadi error, akan ditampilkan dari Google Script-nya
                resultDiv.innerHTML = `<span style="color:red;">Error: ${error.message}</span>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
